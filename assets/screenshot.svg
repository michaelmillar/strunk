<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" width="820" height="620">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="820" height="620" fill="#0d1117"/>

  <g filter="url(#shadow)">
    <rect x="20" y="20" width="780" height="580" rx="10" fill="#1a1b26"/>

    <rect x="20" y="20" width="780" height="40" rx="10" fill="#24283b"/>
    <rect x="20" y="50" width="780" height="10" fill="#24283b"/>
    <circle cx="44" cy="40" r="7" fill="#f7768e"/>
    <circle cx="66" cy="40" r="7" fill="#e0af68"/>
    <circle cx="88" cy="40" r="7" fill="#9ece6a"/>
    <text x="410" y="45" font-family="'SF Mono', monospace" font-size="13" fill="#565f89" text-anchor="middle">cargo run --example order_flow</text>

    <text x="40" y="90" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#565f89">$</text>
    <text x="58" y="90" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5"> cargo run --example order_flow</text>

    <text x="40" y="125" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#565f89">// One transaction. Three operations. All or nothing.</text>

    <text x="40" y="160" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#7aa2f7">let mut</text>
    <text x="117" y="160" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5"> tx = strunk.</text>
    <text x="243" y="160" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#bb9af7">begin</text>
    <text x="285" y="160" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">().</text>
    <text x="310" y="160" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#7aa2f7">await</text>
    <text x="352" y="160" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">?;</text>

    <text x="40" y="195" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">strunk.</text>
    <text x="100" y="195" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#bb9af7">task</text>
    <text x="134" y="195" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">(&amp;mut tx, </text>
    <text x="234" y="195" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#9ece6a">"email-notifications"</text>
    <text x="407" y="195" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">)</text>

    <text x="60" y="220" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">.</text>
    <text x="68" y="220" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#bb9af7">payload</text>
    <text x="127" y="220" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">(json!({</text>
    <text x="193" y="220" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#9ece6a">"to"</text>
    <text x="227" y="220" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">: </text>
    <text x="244" y="220" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#9ece6a">"user@example.com"</text>
    <text x="396" y="220" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">}))</text>

    <text x="60" y="245" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">.</text>
    <text x="68" y="245" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#bb9af7">priority</text>
    <text x="135" y="245" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">(</text>
    <text x="143" y="245" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#ff9e64">5</text>
    <text x="152" y="245" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">).</text>
    <text x="168" y="245" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#bb9af7">submit</text>
    <text x="218" y="245" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">().</text>
    <text x="243" y="245" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#7aa2f7">await</text>
    <text x="285" y="245" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">?;</text>

    <text x="40" y="280" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">strunk.</text>
    <text x="100" y="280" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#bb9af7">change</text>
    <text x="152" y="280" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">(&amp;mut tx, </text>
    <text x="252" y="280" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#9ece6a">"order"</text>
    <text x="306" y="280" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">, </text>
    <text x="323" y="280" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#9ece6a">"42"</text>
    <text x="357" y="280" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">)</text>

    <text x="60" y="305" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">.</text>
    <text x="68" y="305" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#bb9af7">state</text>
    <text x="110" y="305" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">(json!({</text>
    <text x="176" y="305" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#9ece6a">"status"</text>
    <text x="244" y="305" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">: </text>
    <text x="261" y="305" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#9ece6a">"confirmed"</text>
    <text x="345" y="305" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">}))</text>

    <text x="60" y="330" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">.</text>
    <text x="68" y="330" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#bb9af7">publish</text>
    <text x="118" y="330" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">().</text>
    <text x="143" y="330" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#7aa2f7">await</text>
    <text x="185" y="330" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">?;</text>

    <text x="40" y="365" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">tx.</text>
    <text x="66" y="365" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#bb9af7">commit</text>
    <text x="118" y="365" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">().</text>
    <text x="143" y="365" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#7aa2f7">await</text>
    <text x="185" y="365" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#c0caf5">?;</text>

    <line x1="40" y1="390" x2="760" y2="390" stroke="#3b4261" stroke-width="1" stroke-dasharray="4,4"/>

    <text x="40" y="420" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#9ece6a">submitted task 1</text>
    <text x="40" y="445" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#9ece6a">published change 2</text>
    <text x="40" y="470" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#9ece6a">transaction committed: task and change are now visible</text>

    <text x="40" y="505" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#7aa2f7">processing task 1 from queue 'email-notifications'</text>
    <text x="40" y="530" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#7aa2f7">order 42 is now: {"status":"confirmed"}</text>

    <text x="40" y="565" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#e0af68">current snapshot for order 42: confirmed</text>
    <text x="40" y="585" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#565f89">pending tasks in email-notifications: 0</text>
  </g>
</svg>
